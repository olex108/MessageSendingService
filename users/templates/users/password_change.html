<!-- password_change.html -->
{% extends 'users/base.html' %}

{% load widget_tweaks %}
{% load static %}

{% block title %}Change password{% endblock %}

{% block content %}
    <form id="myForm" method="post" action="" class="form-floating">
        <img class="mb-4" src="/static/images/noroot.svg" alt="" width="72" height="72">
        <h1 class="h3 mb-3 fw-normal">Смена пароля</h1>
        {% csrf_token %}
        {{form.not_field_errors}}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 py-2" type="submit">Сохранить изменения</button>
        <p class="mt-5 mb-3 text-body-secondary">&copy; 2017–2025</p>
    </form>
{% endblock %}
