<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Рассылка{% endblock %}</title>

    <link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
    
    <!-- ДОБАВЛЕНО: CSS для иконок Font Awesome 6 (требуется datepicker-plus) -->

    <link rel="stylesheet" type="text/css" href="/static/css/dashboard.css">

    {{ form.media.css }}

  </head>
  <body>

    {% include 'mailing/includes/header.html' %}

      <div class="container-fluid">
        <div class="row">
          {% include 'mailing/includes/navbar.html' %}

          <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
              <h1 class="h3">{% block page_name %}Главная{% endblock %}</h1>
              <div class="btn-toolbar mb-2 mb-md-0">
                {% block page_buttons %}{% endblock %}
              </div>
            </div>
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>

      <script type="text/javascript" src="/static/js/bootstrap.bundle.min.js"></script>
      <script type="text/javascript" src="/static/js/feather.min.js"></script>
      <script type="text/javascript" src="/static/js/Chart.min.js"></script>
      <script type="text/javascript" src="/static/js/dashboard.js"></script>

  </body>
</html>
