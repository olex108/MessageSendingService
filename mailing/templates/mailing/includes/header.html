<header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
   <div class="col-md-3 col-lg-2 me-0 px-3">
    <img class="bd-placeholder-img rounded-circle" width="45" height="45" src="/static/images/logo_white.svg">
    <a class="navbar-brand" href="{% url 'mailing:home'%}">РАССЫЛКА</a>
  </div>
  <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <input class="form-control form-control-dark w-100" type="text" placeholder="Search" aria-label="Search">
  <div class="navbar-nav">
    <div class="nav-item text-nowrap">
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'users:logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link px-3">Выход</button>
        </form>
      {% else %}
        <a class="nav-link px-3" href="{% url 'users:login'%}">Вход</a>
      {% endif %}
    </div>
  </div>
</header>
